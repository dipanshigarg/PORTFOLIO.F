<!-- lang="en" defines document language as English -->
<html lang="en">

<!-- Head section - Contains metadata, not visible on page -->
<head>

    <!-- Character encoding - UTF-8 supports all international characters -->
    <meta charset="UTF-8">

    <!-- Viewport meta - Makes website responsive on mobile devices -->
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <!-- Page title - Appears in browser tab -->
    <title>Rishihood Profile</title>

    <!-- Favicon - Small icon shown in browser tab -->
    <link rel="icon"
          href="https://rishihoodmarketingimg.s3.ap-south-1.amazonaws.com/commonLP/imgs/logo"
          type="image/png">

    <style>

    </style>

</head>


<!-- Body section - Contains all visible page content -->
<body>

    <!-- Heading Level 1 - Main page heading (largest) -->
    <h1 class="ru" style="color: red; background-color: blue;">Rishihood University</h1>
    <h1 class="ru1" blue;>Rishihood University1</h1>

    <!-- Paragraph | For blocks of text -->
    <p>We are creating portfolio of Rishihood University</p>

    <!-- Heading Level 4 - Subheading (smaller than h1, h2, h3) -->
    <h4>Once you click on any of the section, you can Directly jump to the respective section</h4>

    <!-- Anchor tag - Creates hyperlinks -->
    <!-- Internal links with # jump to sections on same page -->
    <a href="#section_1">Section 1</a>

    <!-- Line break - Creates new line without starting new paragraph -->
    <br>

    <a href="#section_2">Section 2</a><br>
    <a href="#section_3">Section 3</a><br>

    <!-- External link - target="_blank" opens in new tab -->
    <a href="https://www.google.com/" target="_blank">Google (Opens in new tab)</a><br>

</body>
