<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Google UI Clone</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <!-- Google Font -->
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500&display=swap" rel="stylesheet">

    <!-- External CSS -->
    <link rel="stylesheet" href="assign5.css">
</head>

<body>

    <!-- NAVBAR -->
    <header>
        <div class="nav-left">
            <a href="#">About</a>
            <a href="#">Store</a>
        </div>

        <div class="nav-right">
            <a href="#">Gmail</a>
            <a href="#">Images</a>
            <a href="#">☰</a>
            <a href="#" class="sign-btn">Sign in</a>
        </div>
    </header>

    <!-- MAIN SECTION -->
    <main>
        <div class="logo">Google</div>

        <div class="search-box">
            <span>🔍</span>
            <input type="text" placeholder="Search Google...">
            <span>🎤</span>
        </div>

        <div class="buttons">
            <button>Google Search</button>
            <button>I'm Feeling Lucky</button>
        </div>

        <div class="language">
            Google offered in: हिन्दी বাংলা తెలుగు मराठी தமிழ் ગુજરાતી ಕನ್ನಡ മലയാളം ਪੰਜਾਬੀ
        </div>
    </main>

    <!-- FOOTER -->
    <footer>
        <div class="footer-top">
            India
        </div>

        <div class="footer-bottom">
            <div>
                <a href="#">Advertising</a>
                <a href="#">Business</a>
                <a href="#">How Search works</a>
            </div>

            <div>
                <a href="#">Privacy</a>
                <a href="#">Terms</a>
                <a href="#">Settings</a>
            </div>
        </div>
    </footer>

</body>
</html>
